---
cloud_provider: Azure
ansible_connection: local

cloud_impact: |
  • Service availability degradation
  • Increased application latency
  • Network connectivity interruptions
  • Possible workload failures

cloud_possible_causes: |
  • Virtual Machine unavailable
  • Network Security Group issue
  • Virtual Network routing problem
  • Azure platform service degradation

cloud_recommended_action: |
  • Check VM health
  • Review NSG rules
  • Verify Virtual Network routes
  • Review Azure Monitor alerts

memory_impact: |
  • Virtual machine performance degradation
  • Increased application response time
  • Reduced workload capacity
  • Possible service interruption

memory_possible_causes: |
  • High VM memory utilization
  • Memory leak
  • Large application cache
  • Recent deployment
  • Insufficient VM memory

memory_recommended_action: |
  • Review Azure Monitor memory metrics
  • Check running processes
  • Investigate memory leaks
  • Restart affected services if required
  • Consider resizing the VM

monitoring_enabled: true

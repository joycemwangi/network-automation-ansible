---
# =============================
# ON-PREM NETWORK (CISCO IOS)
# =============================
- name: Gather Cisco IOS device facts
  cisco.ios.ios_facts:
  register: device_facts

- name: Display network device health information
  ansible.builtin.debug:
    msg: |
      ==============================
      NETWORK DEVICE HEALTH REPORT
      ==============================
      Hostname      : {{ ansible_net_hostname }}
      OS Version    : {{ ansible_net_version }}
      Model         : {{ ansible_net_model }}
      Serial Number : {{ ansible_net_serialnum }}
      Uptime        : {{ ansible_net_uptime | default('N/A') }}

# =============================
# CLOUD LAYER (SIMULATED AWS/AZURE METRICS)
# =============================

- name: Simulate cloud instance health metrics
  ansible.builtin.set_fact:
    cloud_metrics:
      cloud_provider: "AWS/Azure (simulated)"
      instance_health: "healthy"
      cpu_utilization: 62
      memory_utilization: 58
      network_latency_ms: 12

- name: Display cloud infrastructure metrics
  ansible.builtin.debug:
    msg: |
      ==============================
      CLOUD INFRASTRUCTURE METRICS
      ==============================
      Cloud Provider      : {{ cloud_metrics.cloud_provider }}
      Instance Status     : {{ cloud_metrics.instance_health }}
      CPU Utilization     : {{ cloud_metrics.cpu_utilization }}%
      Memory Utilization  : {{ cloud_metrics.memory_utilization }}%
      Network Latency     : {{ cloud_metrics.network_latency_ms }} ms

# =============================
# CLOUD ALERTING LAYER
# =============================

- name: Cloud CPU alert
  ansible.builtin.debug:
    msg: "⚠ CLOUD ALERT: High CPU usage detected in cloud instance"
  when: cloud_metrics.cpu_utilization > 80

- name: Cloud memory alert
  ansible.builtin.debug:
    msg: "⚠ CLOUD ALERT: High memory usage detected in cloud instance"
  when: cloud_metrics.memory_utilization > 80

- name: Cloud latency alert
  ansible.builtin.debug:
    msg: "⚠ CLOUD ALERT: High network latency detected"
  when: cloud_metrics.network_latency_ms > 50

# =============================
# NETWORK ALERTING (CISCO)
# =============================

- name: Get interface status
  cisco.ios.ios_command:
    commands:
      - show ip interface brief
  register: interface_output

- name: Detect interface issues
  ansible.builtin.debug:
    msg: "⚠ ALERT: Interface issue detected on {{ inventory_hostname }}"
  when: interface_output.stdout[0] is search("down")

# =============================
# HYBRID SUMMARY
# =============================
- name: Hybrid monitoring summary
  ansible.builtin.debug:
    msg: |
      ==============================
      HYBRID OBSERVABILITY SUMMARY
      ==============================
      Network Domain : Cisco IOS Devices
      Cloud Domain   : AWS/Azure Metrics (Simulated)
      Status         : Monitoring Active

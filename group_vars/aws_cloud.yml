---
cloud_provider: AWS
ansible_connection: local

cloud_impact: |
  • Service availability degradation
  • Increased application latency
  • Network connectivity interruptions
  • Possible workload failures

cloud_possible_causes: |
  • EC2 instance unhealthy
  • VPC routing issue
  • Security Group or NACL misconfiguration
  • CloudWatch reported degraded health

cloud_recommended_action: |
  • Check EC2 instance health
  • Verify VPC route tables
  • Review Security Groups
  • Review Amazon CloudWatch metrics
  • Review Auto Scaling Group health if applicable

memory_impact: |
  • Application response time degradation
  • Increased swap utilization
  • Reduced EC2 performance
  • Possible application failures

memory_possible_causes: |
  • High application memory consumption
  • Memory leak
  • Large in-memory caches
  • Recent application deployment
  • Insufficient instance memory

memory_recommended_action: |
  • Review Amazon CloudWatch memory metrics
  • Check running processes
  • Investigate memory leaks
  • Restart affected services if required
  • Consider vertical scaling (increase EC2 instance size)
  • Verify Auto Scaling Group configuration for horizontal scaling

latency_impact: |
  • Increased application response times
  • API request delays
  • Higher network round-trip times
  • Reduced workload performance

latency_possible_causes: |
  • VPC networking congestion
  • Cross-Availability Zone or Cross-Region traffic
  • Transit Gateway routing issue
  • Internet Gateway latency
  • AWS regional service degradation

latency_recommended_action: |
  • Review Amazon CloudWatch network metrics
  • Verify VPC Flow Logs
  • Check Transit Gateway health
  • Review AWS Health Dashboard
  • Investigate application network traffic

monitoring_enabled: true

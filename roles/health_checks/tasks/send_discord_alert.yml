---
# ==========================================
# SEND DISCORD ALERT
# ==========================================

- name: Select alert icon
  ansible.builtin.set_fact:
    alert_icon: >-
      {% if alert_severity == 'Critical' %}
      🔴
      {% elif alert_severity == 'Major' %}
      🟠
      {% else %}
      🟡
      {% endif %}

- name: Send Discord notification
  ansible.builtin.uri:
    url: "{{ discord_webhook_url }}"
    method: POST
    body_format: json

    body:

      username: "Ansible Health Monitor"

      content: |
        {{ alert_icon | trim }} **{{ alert_title }}**

        **Host**
        {{ inventory_hostname }}

        **Environment**
        {{ group_names | join(', ') }}

        **Severity**
        {{ alert_severity }}

        **Details**
        {{ alert_message }}

        **Time**
        {{ lookup('pipe', 'date -u +"%Y-%m-%d %H:%M:%S UTC"') }}

    status_code: 204

  when:
    - enable_discord_alerts
    - discord_webhook_url | length > 0

---
# ==========================================================
# HYBRID INFRASTRUCTURE MONITORING
# ==========================================================
#
# This playbook is designed to run in two modes:
#
# 1. Demonstration Mode (Default)
#    - Uses simulated infrastructure metrics.
#    - Runs anywhere including GitHub Actions.
#    - Requires no production infrastructure.
#
# 2. Production Mode
#    - Uses live infrastructure metrics.
#    - Supports hybrid infrastructure environments.
#    - Monitors on-premises network devices, private cloud,
#      and public cloud platforms (AWS, Azure, GCP and OCI).
#    - Collects real CPU, memory, latency and connectivity metrics.
#    - Enable by setting:
#
#         use_live_monitoring: true
#
# ==========================================================

# =============================
# DEVICE IDENTIFICATION
# =============================

- name: Identify infrastructure node
  ansible.builtin.debug:
    msg: |
      ==============================
      NODE IDENTIFICATION
      ==============================
      Host   : {{ inventory_hostname }}
      Groups : {{ group_names }}

# ==========================================================
# FUTURE PRODUCTION IMPLEMENTATION
#
# Disabled by default.
#
# When live infrastructure is available,
# enable:
#
# use_live_monitoring: true
#
# ==========================================================

- name: Collect On-Premises Network CPU Utilization (Production)
  cisco.ios.ios_command:
    commands:
      - show processes cpu | include CPU utilization
  register: health_checks_cisco_cpu
  when:
    - use_live_monitoring | default(false)
    - "'routers' in group_names or 'switches' in group_names"

- name: Extract On-Premises Network CPU Utilization
  ansible.builtin.set_fact:
    health_checks_cpu_utilization: >-
      {{
        health_checks_cisco_cpu.stdout[0]
        | regex_search('CPU utilization for five seconds: ([0-9]+)%', '\1')
        | first
        | int
      }}
  when:
    - use_live_monitoring | default(false)
    - health_checks_cisco_cpu is defined

# =============================
# ON-PREMISES NETWORK DEVICES
# =============================

- name: Monitor On-Premises Network Devices
  when:
    - enable_network_checks
    - "'routers' in group_names or 'switches' in group_names"

  block:

    - name: Gather On-Premises Device Facts
      cisco.ios.ios_facts:
      register: health_checks_device_facts

    - name: Display On-Premises network device health
      ansible.builtin.debug:
        msg: |
          ==============================
          ON-PREMISES NETWORK DEVICE HEALTH
          ==============================
          Hostname      : {{ ansible_net_hostname }}
          OS Version    : {{ ansible_net_version }}
          Model         : {{ ansible_net_model }}
          Serial Number : {{ ansible_net_serialnum | default('N/A') }}

  rescue:

    - name: Send Network Failure Alert
      ansible.builtin.include_tasks: send_monitoring_alert.yml
      vars:
        alert_title: "NETWORK DEVICE UNREACHABLE"
        alert_severity: "Critical"
        alert_message: |
          Unable to connect to device.

          Possible causes:
          • SSH unreachable
          • Authentication failure
          • Device offline
          • Connection timeout
# =============================
# CLOUD INFRASTRUCTURE
# =============================
- name: Monitor Cloud Infrastructure
  when:
    - enable_monitoring_checks
    - >
      'aws_cloud' in group_names or
      'azure_cloud' in group_names or
      'gcp_cloud' in group_names or
      'oci_cloud' in group_names or
      'private_cloud' in group_names

  block:

    - name: Simulate Cloud Infrastructure Monitoring
      ansible.builtin.debug:
        msg: |
          ==============================
          CLOUD INFRASTRUCTURE HEALTH
          ==============================
          Provider : {{ cloud_provider | default('Unknown') }}
          Host     : {{ inventory_hostname }}
          Mode     : Demonstration (Simulated Metrics)
      when:
        - not use_live_monitoring | default(false)

    - name: Collect Live Cloud Metrics (Production)
      ansible.builtin.debug:
        msg: "Production cloud monitoring will collect live cloud metrics."
      when:
        - use_live_monitoring | default(false)

  rescue:

    - name: Send Cloud Platform Failure Alert
      ansible.builtin.include_tasks: send_monitoring_alert.yml
      vars:
        alert_title: "CLOUD PLATFORM UNREACHABLE"
        alert_severity: "Critical"
        alert_message: |
          Unable to connect to cloud platform.

          Possible causes:
          • Cloud API unavailable
          • Authentication failure
          • Network connectivity issue
          • Cloud provider outage

# =============================
# MONITORING METRICS
# =============================

- name: Build monitoring metrics
  when:
    - enable_monitoring_checks

  block:

    - name: Create monitoring metrics
      ansible.builtin.set_fact:
        health_checks_monitoring_metrics:

          provider: "{{ cloud_provider | default('Unknown') }}"

          cpu_utilization: >-
            {{
              health_checks_cpu_utilization
              | default(95)
              if use_live_monitoring | default(false)
              else 95
            }}

          memory_utilization: >-
            {{
              55
              if use_live_monitoring | default(false)
              else 88
            }}

          network_latency_ms: >-
            {{
              15
              if use_live_monitoring | default(false)
              else 120
            }}

          cloud_service_status: >-
            {{
              'Degraded'
              if use_live_monitoring | default(false)
              else 'Degraded'
            }}

          api_status: >-
            {{
              'Reachable'
              if use_live_monitoring | default(false)
              else 'Reachable'
            }}

          resource_health: >-
            {{
              'Warning'
              if use_live_monitoring | default(false)
              else 'Warning'
            }}

          availability_zone: "{{ availability_zone | default('N/A') }}"

    - name: Display monitoring metrics
      ansible.builtin.debug:
        msg: |
          ==============================
          INFRASTRUCTURE HEALTH REPORT
          ==============================
          Provider : {{ health_checks_monitoring_metrics.provider }}
          CPU      : {{ health_checks_monitoring_metrics.cpu_utilization }}%
          Memory   : {{ health_checks_monitoring_metrics.memory_utilization }}%
          Latency  : {{ health_checks_monitoring_metrics.network_latency_ms }} ms

    - name: Build connectivity status
      ansible.builtin.set_fact:
        health_checks_connectivity:
          api_reachable: true
          dns_reachable: true
          internet_gateway: up

    - name: Display connectivity status
      ansible.builtin.debug:
        msg: |
          ==============================
          CONNECTIVITY STATUS
          ==============================
          API       : {{ health_checks_connectivity.api_reachable }}
          DNS       : {{ health_checks_connectivity.dns_reachable }}
          Gateway   : {{ health_checks_connectivity.internet_gateway }}

  rescue:

    - name: Send Monitoring Failure Alert
      ansible.builtin.include_tasks: send_monitoring_alert.yml
      vars:
        alert_title: "MONITORING PLATFORM FAILURE"
        alert_severity: "Critical"
        alert_message: |
          Infrastructure monitoring failed.

          Possible causes:
          • API unavailable
          • Authentication failure
          • Cloud service outage
          • Network connectivity issue

# =============================
# REAL-TIME ALERTING
# =============================

# -----------------------------
# CPU ALERT
# -----------------------------

- name: Determine CPU alert severity
  ansible.builtin.set_fact:
    health_checks_cpu_alert_severity: >-
      {% if health_checks_monitoring_metrics.cpu_utilization >= cpu_critical_threshold %}
      Critical
      {% elif health_checks_monitoring_metrics.cpu_utilization >= cpu_major_threshold %}
      Major
      {% else %}
      Warning
      {% endif %}
  when:
    - health_checks_monitoring_metrics is defined
    - health_checks_monitoring_metrics.cpu_utilization > cpu_threshold

- name: Send High CPU Alert
  ansible.builtin.include_tasks: send_monitoring_alert.yml
  vars:
    alert_title: >-
      {{ health_checks_cpu_alert_severity | upper }}
      - HIGH CPU UTILIZATION
    alert_severity: "{{ health_checks_cpu_alert_severity | trim }}"
    alert_message: |
      Alert Type : CPU Utilization
      Status     : Threshold Exceeded
      Time       : {{ now(utc=true).strftime('%Y-%m-%d %H:%M:%S UTC') }}

      Provider   : {{ health_checks_monitoring_metrics.provider }}
      Host       : {{ inventory_hostname }}

      CPU Usage  : {{ health_checks_monitoring_metrics.cpu_utilization }}%
      Threshold  : {{ cpu_threshold }}%
      Exceeded By: {{ health_checks_monitoring_metrics.cpu_utilization - cpu_threshold }}%

            Impact:
      {% if health_checks_monitoring_metrics.provider == 'On-Premises Network' %}
      • Slower routing protocol convergence
      • Increased packet processing delays
      • Reduced control plane responsiveness
      • Possible service degradation

      Possible Causes:
      • High routing protocol activity
      • CPU-intensive processes
      • Traffic spikes or DDoS events
      • Control plane overload
      • Recent configuration deployment

      Recommended Action:
      • Review CPU-intensive processes
      • Verify BGP/OSPF neighbor stability
      • Check interface utilization, drops and error counters
      • Verify MTU consistency to avoid fragmentation
      • Review recent configuration changes or deployments

      {% elif health_checks_monitoring_metrics.provider == 'AWS' %}

      • Increased application response times
      • EC2 performance degradation
      • Delayed workload processing
      • Auto Scaling events may occur

      Possible Causes:
      • High application workload
      • EC2 CPU saturation
      • Background processes consuming CPU
      • Burstable instance CPU credit depletion
      • Recent deployment or software update

      Recommended Action:
      • Review Amazon CloudWatch CPU metrics
      • Verify EC2 instance health
      • Check Auto Scaling activity
      • Review running processes
      • Consider resizing the instance

      {% elif health_checks_monitoring_metrics.provider == 'Azure' %}

      • Increased application response times
      • Virtual Machine performance degradation
      • Slower workload execution
      • Possible service interruption

      Possible Causes:
      • High VM CPU utilization
      • Application workload spike
      • Azure platform maintenance
      • Recent deployment or update

      Recommended Action:
      • Review Azure Monitor metrics
      • Check VM Insights
      • Review running processes
      • Verify Load Balancer health
      • Consider resizing the VM

      {% elif health_checks_monitoring_metrics.provider == 'GCP' %}

      • Increased application latency
      • Compute Engine performance degradation
      • Slower workload execution
      • Autoscaling may be triggered

      Possible Causes:
      • Compute Engine CPU saturation
      • High application workload
      • Background services consuming CPU
      • Recent deployment

      Recommended Action:
      • Review Cloud Monitoring metrics
      • Verify Compute Engine health
      • Check Managed Instance Groups
      • Review Cloud Logging
      • Consider resizing the instance

      {% elif health_checks_monitoring_metrics.provider == 'OCI' %}

      • Increased application response times
      • Compute instance performance degradation
      • Slower workload execution
      • Possible service impact

      Possible Causes:
      • Compute instance CPU saturation
      • High workload demand
      • Background processes
      • Recent deployment

      Recommended Action:
      • Review OCI Monitoring metrics
      • Verify Compute instance health
      • Check workload utilization
      • Review running processes
      • Consider increasing compute resources

      {% elif health_checks_monitoring_metrics.provider == 'Private Cloud' %}

      • Virtual machine performance degradation
      • Increased workload response time
      • Reduced infrastructure capacity
      • Possible impact to hosted services

      Possible Causes:
      • Hypervisor CPU contention
      • Virtual machine CPU saturation
      • Excessive resource overcommitment
      • Background workloads

      Recommended Action:
      • Review hypervisor utilization
      • Check virtual machine CPU usage
      • Verify resource allocation
      • Review virtualization platform logs
      • Consider adding compute capacity

      {% endif %}

# -----------------------------
# MEMORY ALERT
# -----------------------------

- name: Determine Memory alert severity
  ansible.builtin.set_fact:
    health_checks_memory_alert_severity: >-
      {% if health_checks_monitoring_metrics.memory_utilization >= memory_critical_threshold %}
      Critical
      {% elif health_checks_monitoring_metrics.memory_utilization >= memory_major_threshold %}
      Major
      {% else %}
      Warning
      {% endif %}
  when:
    - health_checks_monitoring_metrics is defined
    - health_checks_monitoring_metrics.memory_utilization > memory_threshold

- name: Send High Memory Alert
  ansible.builtin.include_tasks: send_monitoring_alert.yml
  vars:
    alert_title: >-
      {{ health_checks_memory_alert_severity | upper }}
      - HIGH MEMORY UTILIZATION
    alert_severity: "{{ health_checks_memory_alert_severity | trim }}"
    alert_message: |
      Alert Type : Memory Utilization
      Status     : Threshold Exceeded
      Time       : {{ now(utc=true).strftime('%Y-%m-%d %H:%M:%S UTC') }}

      Provider   : {{ health_checks_monitoring_metrics.provider }}
      Host       : {{ inventory_hostname }}

      Memory Usage : {{ health_checks_monitoring_metrics.memory_utilization }}%
      Threshold    : {{ memory_threshold }}%
      Exceeded By  : {{ health_checks_monitoring_metrics.memory_utilization - memory_threshold }}%

      Impact:
      • Reduced device stability
      • Slower application or control plane performance
      • Risk of process restarts or failures
      • Possible service interruption if memory exhaustion occurs

      Possible Causes:
      • Memory-intensive processes
      • Memory leaks
      • Insufficient system resources
      • Large routing or forwarding tables
      • Recent software deployment

      Recommended Action:
      • Review memory utilization by active processes
      • Check for memory leaks or abnormal consumption
      • Verify system buffer and cache utilization
      • Review recent configuration changes or deployments
      • Consider capacity expansion if utilization remains high
  when:
    - enable_memory_alerts
    - health_checks_monitoring_metrics is defined
    - health_checks_monitoring_metrics.memory_utilization > memory_threshold

# -----------------------------
# LATENCY ALERT
# -----------------------------

- name: Determine Latency alert severity
  ansible.builtin.set_fact:
    health_checks_latency_alert_severity: >-
      {% if health_checks_monitoring_metrics.network_latency_ms >= latency_critical_threshold %}
      Critical
      {% elif health_checks_monitoring_metrics.network_latency_ms >= latency_major_threshold %}
      Major
      {% else %}
      Warning
      {% endif %}
  when:
    - health_checks_monitoring_metrics is defined
    - health_checks_monitoring_metrics.network_latency_ms > latency_threshold

- name: Send High Latency Alert
  ansible.builtin.include_tasks: send_monitoring_alert.yml
  vars:
    alert_title: >-
      {{ health_checks_latency_alert_severity | upper }}
      - HIGH NETWORK LATENCY
    alert_severity: "{{ health_checks_latency_alert_severity | trim }}"
    alert_message: |
      Alert Type : Network Latency
      Status     : Threshold Exceeded
      Time       : {{ now(utc=true).strftime('%Y-%m-%d %H:%M:%S UTC') }}

      Provider   : {{ health_checks_monitoring_metrics.provider }}
      Host       : {{ inventory_hostname }}

      Latency     : {{ health_checks_monitoring_metrics.network_latency_ms }} ms
      Threshold   : {{ latency_threshold }} ms
      Exceeded By : {{ health_checks_monitoring_metrics.network_latency_ms - latency_threshold }} ms

      Impact:
      • Increased application response times
      • Voice and video quality degradation
      • Packet retransmissions and reduced throughput
      • Slower access to network services

      Possible Causes:
      • WAN congestion
      • ISP degradation
      • Routing convergence or path changes
      • Interface saturation
      • Cloud provider latency

      Recommended Action:
      • Verify WAN and ISP connectivity
      • Check interface congestion, packet drops and errors
      • Verify routing convergence (BGP/OSPF)
      • Verify QoS policies are operating correctly
      • Check latency, jitter and packet loss across the network path
  when:
    - enable_latency_alerts
    - health_checks_monitoring_metrics is defined
    - health_checks_monitoring_metrics.network_latency_ms > latency_threshold

# -----------------------------
# CLOUD HEALTH EVALUATION
# -----------------------------

- name: Determine Cloud Infrastructure Health
  ansible.builtin.set_fact:
    health_checks_cloud_alert: >-
      {{
        health_checks_monitoring_metrics.cloud_service_status != 'Healthy'
        or health_checks_monitoring_metrics.resource_health != 'Healthy'
        or health_checks_monitoring_metrics.api_status != 'Reachable'
      }}
  when:
    - health_checks_monitoring_metrics.provider != 'On-Premises Network'
    - health_checks_monitoring_metrics.provider != 'Unknown'

- name: Debug Cloud Alert Evaluation
  ansible.builtin.debug:
    msg: |
      Provider              : {{ health_checks_monitoring_metrics.provider }}
      Cloud Service Status  : {{ health_checks_monitoring_metrics.cloud_service_status }}
      API Status            : {{ health_checks_monitoring_metrics.api_status }}
      Resource Health       : {{ health_checks_monitoring_metrics.resource_health }}
      Cloud Alert           : {{ health_checks_cloud_alert | default('NOT SET') }}

# -----------------------------
# CLOUD INFRASTRUCTURE ALERT
# -----------------------------

- name: Send Cloud Infrastructure Alert
  ansible.builtin.include_tasks: send_monitoring_alert.yml
  vars:
    alert_title: "CRITICAL - {{ health_checks_monitoring_metrics.provider | upper }} INFRASTRUCTURE ALERT"
    alert_severity: "Critical"
    alert_message: |
      Alert Type : {{ health_checks_monitoring_metrics.provider }} Infrastructure
      Status     : Service Health Issue
      Time       : {{ now(utc=true).strftime('%Y-%m-%d %H:%M:%S UTC') }}

      Provider   : {{ health_checks_monitoring_metrics.provider }}
      Host       : {{ inventory_hostname }}

      Impact:
         {{ cloud_impact }}

      Possible Causes:
        {{ cloud_possible_causes }}

      Recommended Action:
        {{ cloud_recommended_action }}
  when:
    - enable_alerting
    - health_checks_cloud_alert | default(false)

# -----------------------------
# NETWORK DEVICE ALERT
# -----------------------------

- name: Send Network Device Alert
  ansible.builtin.include_tasks: send_monitoring_alert.yml
  vars:
    alert_title: "CRITICAL - ON-PREMISES NETWORK DEVICE ALERT"
    alert_severity: "Critical"
    alert_message: |
      Alert Type : Network Device
      Status     : Device Health Issue
      Time       : {{ now(utc=true).strftime('%Y-%m-%d %H:%M:%S UTC') }}

      Device     : {{ inventory_hostname }}
      Groups     : {{ group_names | join(', ') }}

      Condition : Interface health anomaly detected

      Impact:
      • Reduced network throughput
      • Packet loss or intermittent connectivity
      • Increased error rates
      • Potential service disruption

      Possible Causes:
      • Interface errors or CRC failures
      • Speed or duplex mismatch
      • Faulty cable or transceiver
      • Hardware failure
      • Recent configuration changes

      Recommended Action:
      • Verify interface operational status
      • Check interface error, CRC and drop counters
      • Verify interface speed and duplex settings
      • Confirm cable or transceiver health
      • Review recent configuration changes
  when:
    - enable_network_alerts
    - "'routers' in group_names or 'switches' in group_names"

# =============================
# SUMMARY
# =============================

- name: Infrastructure monitoring summary
  ansible.builtin.debug:
    msg: |
      ==============================
      HYBRID OBSERVABILITY SUMMARY
      ==============================
      Host   : {{ inventory_hostname }}
      Mode   : {{ monitoring_mode }}
      Status : Monitoring Active

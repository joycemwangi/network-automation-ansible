---
cloud_provider: GCP
ansible_connection: local

cloud_impact: |
  • Service availability degradation
  • Increased application latency
  • Network connectivity interruptions
  • Possible workload failures

cloud_possible_causes: |
  • Compute Engine instance unhealthy
  • VPC firewall rule issue
  • Cloud Router connectivity problem
  • Google Cloud service disruption

cloud_recommended_action: |
  • Check Compute Engine instance health
  • Review VPC Firewall Rules
  • Verify Cloud Router status
  • Review Cloud Monitoring metrics
  • Review Managed Instance Group health if applicable

memory_impact: |
  • Compute Engine performance degradation
  • Increased application latency
  • Reduced workload capacity
  • Possible service interruption

memory_possible_causes: |
  • High memory utilization
  • Memory leak
  • Large application cache
  • Recent deployment
  • Insufficient instance memory

memory_recommended_action: |
  • Review Cloud Monitoring memory metrics
  • Check running processes
  • Investigate memory leaks
  • Restart affected services if required
  • Consider vertical scaling (resize the Compute Engine machine type)
  • Verify Managed Instance Group autoscaling configuration

latency_impact: |
  • Increased application response times
  • Compute Engine communication delays
  • Reduced workload performance
  • Slower API responses

latency_possible_causes: |
  • VPC network congestion
  • Cloud Router routing issue
  • Cloud NAT latency
  • Cross-region traffic
  • Google Cloud regional service degradation

latency_recommended_action: |
  • Review Cloud Monitoring network metrics
  • Verify Cloud Router status
  • Check Cloud NAT performance
  • Review VPC Flow Logs
  • Review Google Cloud Service Health

monitoring_enabled: true

---
# =============================
# ALERT HANDLERS
# =============================

- name: Trigger network alert
  ansible.builtin.debug:
    msg: |
      ==========================================
      NETWORK ALERT
      ==========================================
      Severity    : Critical
      Source      : {{ inventory_hostname }}
      Action      : Network Operations notified
      Status      : Escalation triggered

- name: Trigger cloud alert
  ansible.builtin.debug:
    msg: |
      ==========================================
      CLOUD ALERT
      ==========================================
      Severity    : Warning
      Source      : {{ inventory_hostname }}
      Platform    : {{ cloud_metrics.cloud_provider | default('Unknown') }}
      Action      : Cloud Operations notified
      Status      : Incident workflow started

- name: Generate incident report
  ansible.builtin.debug:
    msg: |
      ==========================================
      INCIDENT REPORT
      ==========================================
      Host        : {{ inventory_hostname }}
      Time        : {{ ansible_date_time.iso8601 | default('Runtime') }}
      Status      : Report generated
      Destination : Local audit log (logs/ansible.log)

- name: Send discord notification
  ansible.builtin.uri:
    url: "{{ discord_webhook_url }}"
    method: POST
    body_format: json
    body:
      username: "Ansible Health Monitor"
      content: |
        🚨 **Infrastructure Alert**

        **Host:** {{ inventory_hostname }}

        **Status:** Health check threshold exceeded.

        **Environment:** {{ group_names | join(', ') }}

        **Generated by:** Network Automation with Ansible
    status_code: 204
  when: enable_discord_alerts

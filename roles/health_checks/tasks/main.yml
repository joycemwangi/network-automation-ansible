---
# =============================
# ON-PREM NETWORK (CISCO IOS)
# =============================

- name: Gather Cisco IOS device facts
  cisco.ios.ios_facts:
  register: device_facts

- name: Display network device health information
  ansible.builtin.debug:
    msg: |
      ==============================
      NETWORK DEVICE HEALTH REPORT
      ==============================
      Hostname      : {{ ansible_net_hostname }}
      OS Version    : {{ ansible_net_version }}
      Model         : {{ ansible_net_model }}
      Serial Number : {{ ansible_net_serialnum }}
      Uptime        : {{ ansible_net_uptime | default('N/A') }}

# =============================
# CPU UTILIZATION
# =============================

- name: Get CPU utilization
  cisco.ios.ios_command:
    commands:
      - show processes cpu | include CPU
  register: cpu_output

- name: CPU alert check
  ansible.builtin.debug:
    msg: "⚠ ALERT: High CPU usage detected on {{ inventory_hostname }}"
  when: cpu_output.stdout[0] is search("CPU") and cpu_output.stdout[0] is search("[8-9][0-9]|100")

# =============================
# MEMORY UTILIZATION
# =============================

- name: Get memory usage
  cisco.ios.ios_command:
    commands:
      - show memory statistics
  register: memory_output

- name: Memory alert check
  ansible.builtin.debug:
    msg: "⚠ ALERT: High memory usage detected on {{ inventory_hostname }}"
  when: memory_output.stdout[0] is search("Used") and memory_output.stdout[0] is search("[8-9][0-9]%|100%")

# =============================
# INTERFACE STATUS CHECK
# =============================

- name: Get interface status
  cisco.ios.ios_command:
    commands:
      - show ip interface brief
  register: interface_output

- name: Interface alert check
  ansible.builtin.debug:
    msg: "⚠ ALERT: Interface issue detected on {{ inventory_hostname }}"
  when: interface_output.stdout[0] is search("down") or interface_output.stdout[0] is search("administratively down")

# =============================
# CLOUD LAYER (SIMULATED METRICS)
# =============================

- name: Simulate cloud instance metrics
  ansible.builtin.set_fact:
    cloud_metrics:
      cloud_provider: "AWS/Azure (simulated)"
      instance_health: "healthy"
      cpu_utilization: 62
      memory_utilization: 58
      network_latency_ms: 12

- name: Display cloud metrics
  ansible.builtin.debug:
    msg: |
      ==============================
      CLOUD INFRASTRUCTURE METRICS
      ==============================
      Provider        : {{ cloud_metrics.cloud_provider }}
      Instance Status : {{ cloud_metrics.instance_health }}
      CPU Usage       : {{ cloud_metrics.cpu_utilization }}%
      Memory Usage    : {{ cloud_metrics.memory_utilization }}%
      Latency         : {{ cloud_metrics.network_latency_ms }} ms

# =============================
# CLOUD CONNECTIVITY CHECK
# =============================

- name: Simulate cloud connectivity status
  ansible.builtin.set_fact:
    cloud_connectivity:
      aws_api_reachable: true
      azure_api_reachable: true
      cloud_dns_reachable: true
      internet_gateway_status: "up"

- name: Display cloud connectivity status
  ansible.builtin.debug:
    msg: |
      ==============================
      CLOUD CONNECTIVITY STATUS
      ==============================
      AWS API Reachable      : {{ cloud_connectivity.aws_api_reachable }}
      Azure API Reachable    : {{ cloud_connectivity.azure_api_reachable }}
      DNS Reachable          : {{ cloud_connectivity.cloud_dns_reachable }}
      Internet Gateway       : {{ cloud_connectivity.internet_gateway_status }}

# =============================
# CLOUD ALERTS
# =============================

- name: Cloud CPU alert
  ansible.builtin.debug:
    msg: "⚠ CLOUD ALERT: High CPU usage in cloud instance"
  when: cloud_metrics.cpu_utilization > 80

- name: Cloud memory alert
  ansible.builtin.debug:
    msg: "⚠ CLOUD ALERT: High memory usage in cloud instance"
  when: cloud_metrics.memory_utilization > 80

- name: Cloud latency alert
  ansible.builtin.debug:
    msg: "⚠ CLOUD ALERT: High network latency detected"
  when: cloud_metrics.network_latency_ms > 50

- name: AWS connectivity alert
  ansible.builtin.debug:
    msg: "⚠ CLOUD ALERT: AWS API is unreachable"
  when: not cloud_connectivity.aws_api_reachable

- name: Azure connectivity alert
  ansible.builtin.debug:
    msg: "⚠ CLOUD ALERT: Azure API is unreachable"
  when: not cloud_connectivity.azure_api_reachable

- name: DNS connectivity alert
  ansible.builtin.debug:
    msg: "⚠ CLOUD ALERT: DNS resolution failure"
  when: not cloud_connectivity.cloud_dns_reachable

- name: Internet gateway alert
  ansible.builtin.debug:
    msg: "⚠ CLOUD ALERT: Internet gateway is DOWN"
  when: cloud_connectivity.internet_gateway_status != "up"

# =============================
# HYBRID SUMMARY
# =============================

- name: Final hybrid monitoring summary
  ansible.builtin.debug:
    msg: |
      ==============================
      HYBRID OBSERVABILITY SUMMARY
      ==============================
      Network Domain : Cisco IOS Infrastructure
      Cloud Domain   : AWS/Azure (Simulated)
      Connectivity   : Validated
      Monitoring     : ACTIVE

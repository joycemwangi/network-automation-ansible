---
cloud_provider: Private Cloud
ansible_connection: local

cloud_impact: |
  • Service availability degradation
  • Increased application latency
  • Network connectivity interruptions
  • Possible workload failures

cloud_possible_causes: |
  • Hypervisor failure
  • Storage connectivity issue
  • Virtual network disruption
  • Internal infrastructure outage

cloud_recommended_action: |
  • Check hypervisor health
  • Verify storage systems
  • Review virtualization platform logs
  • Check network infrastructure

cpu_impact: |
  • Increased virtual machine CPU utilization
  • Reduced infrastructure performance
  • Slower application response
  • Possible service degradation

cpu_possible_causes: |
  • Hypervisor resource contention
  • High application workload
  • CPU-intensive virtual machines
  • Resource overcommitment
  • Recent deployment

cpu_recommended_action: |
  • Review hypervisor CPU utilization
  • Identify high CPU virtual machines
  • Verify resource allocation
  • Investigate workload distribution
  • Consider scaling compute resources
  • Review infrastructure monitoring dashboards

memory_impact: |
  • Virtual machine performance degradation
  • Increased workload response time
  • Reduced infrastructure capacity
  • Possible service interruption

memory_possible_causes: |
  • Memory overcommitment
  • Hypervisor memory contention
  • Memory leak
  • Recent virtual machine deployment
  • Insufficient host memory

memory_recommended_action: |
  • Review hypervisor memory utilization
  • Check virtual machine memory allocation
  • Investigate memory leaks
  • Review virtualization platform logs
  • Consider adding host memory

latency_impact: |
  • Increased application response times
  • Slower communication between virtual machines
  • Storage and application access delays
  • Reduced infrastructure performance

latency_possible_causes: |
  • Virtual switch congestion
  • Hypervisor network contention
  • East-west traffic saturation
  • Storage network latency
  • Overlay network (VXLAN/Geneve) congestion
  • Physical uplink saturation

latency_recommended_action: |
  • Review hypervisor network utilization
  • Verify virtual switch health
  • Check storage network latency
  • Review physical uplink utilization
  • Investigate east-west traffic congestion
  • Verify overlay network performance

monitoring_enabled: true

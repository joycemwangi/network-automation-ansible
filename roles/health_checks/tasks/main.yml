---
# =============================
# DEVICE IDENTIFICATION (ALL NODES)
# =============================

- name: Identify infrastructure node
  ansible.builtin.debug:
    msg: |
      ==============================
      NODE IDENTIFICATION
      ==============================
      Host: {{ inventory_hostname }}
      Groups: {{ group_names }}

# =============================
# CISCO NETWORK DEVICES
# =============================

- name: Gather Cisco IOS facts (Network devices only)
  cisco.ios.ios_facts:
  when: "'routers' in group_names or 'switches' in group_names"
  register: device_facts

- name: Display network device health
  ansible.builtin.debug:
    msg: |
      ==============================
      NETWORK DEVICE HEALTH
      ==============================
      Hostname      : {{ ansible_net_hostname }}
      OS Version    : {{ ansible_net_version }}
      Model         : {{ ansible_net_model }}
      Serial Number : {{ ansible_net_serialnum | default('N/A') }}
  when: "'routers' in group_names or 'switches' in group_names"

# =============================
# CLOUD SIMULATION METRICS
# =============================

- name: Generate cloud metrics per provider
  ansible.builtin.set_fact:
    cloud_metrics:
      provider: >-
        {{
          'AWS' if 'aws_cloud' in group_names else
          'Azure' if 'azure_cloud' in group_names else
          'GCP' if 'gcp_cloud' in group_names else
          'OCI' if 'oci_cloud' in group_names else
          'Private Cloud' if 'private_cloud' in group_names else
          'Unknown'
        }}
      cpu_utilization: 65
      memory_utilization: 55
      network_latency_ms: 15

  when: >
    'aws_cloud' in group_names or
    'azure_cloud' in group_names or
    'gcp_cloud' in group_names or
    'oci_cloud' in group_names or
    'private_cloud' in group_names

- name: Display cloud health metrics
  ansible.builtin.debug:
    msg: |
      ==============================
      CLOUD HEALTH REPORT
      ==============================
      Provider        : {{ cloud_metrics.provider }}
      CPU Usage       : {{ cloud_metrics.cpu_utilization }}%
      Memory Usage    : {{ cloud_metrics.memory_utilization }}%
      Latency         : {{ cloud_metrics.network_latency_ms }} ms
  when: cloud_metrics is defined

# =============================
# CLOUD CONNECTIVITY CHECK
# =============================

- name: Simulate cloud connectivity validation
  ansible.builtin.set_fact:
    cloud_connectivity:
      api_reachable: true
      dns_reachable: true
      internet_gateway: "up"
  when: cloud_metrics is defined

- name: Display cloud connectivity status
  ansible.builtin.debug:
    msg: |
      ==============================
      CLOUD CONNECTIVITY STATUS
      ==============================
      API Reachable     : {{ cloud_connectivity.api_reachable }}
      DNS Reachable     : {{ cloud_connectivity.dns_reachable }}
      Internet Gateway  : {{ cloud_connectivity.internet_gateway }}
  when: cloud_metrics is defined

# =============================
# ALERTING (EVENT-DRIVEN)
# =============================

- name: Detect high cloud CPU utilization
  ansible.builtin.debug:
    msg: "⚠ High CPU utilization detected on {{ cloud_metrics.provider }}"
  when:
    - cloud_metrics is defined
    - cloud_metrics.cpu_utilization > cpu_threshold
  changed_when: true
  notify:
    - trigger cloud alert
    - send discord notification

- name: Detect network interface issue
  ansible.builtin.debug:
    msg: "⚠ Interface anomaly detected on {{ inventory_hostname }}"
  when: "'routers' in group_names or 'switches' in group_names"
  changed_when: true
  notify:
    - trigger network alert
    - send discord notification

# =============================
# FINAL SUMMARY
# =============================

- name: Infrastructure monitoring summary
  ansible.builtin.debug:
    msg: |
      ==============================
      HYBRID OBSERVABILITY SUMMARY
      ==============================
      Node            : {{ inventory_hostname }}
      Infrastructure  : Network + Multi-Cloud
      Status          : Monitoring Active
  changed_when: true
  notify:
    - generate incident report

# =============================
# EXECUTE HANDLERS IMMEDIATELY
# =============================

- name: Flush handlers
  meta: flush_handlers

---
# =============================
# DEVICE IDENTIFICATION
# =============================

- name: Identify infrastructure node
  ansible.builtin.debug:
    msg: |
      ==============================
      NODE IDENTIFICATION
      ==============================
      Host   : {{ inventory_hostname }}
      Groups : {{ group_names }}

# =============================
# CISCO NETWORK DEVICES
# =============================

- name: Monitor Cisco network devices
  when:
    - enable_network_checks
    - "'routers' in group_names or 'switches' in group_names"

  block:

    - name: Gather Cisco IOS facts
      cisco.ios.ios_facts:
      register: device_facts

    - name: Display network device health
      ansible.builtin.debug:
        msg: |
          ==============================
          NETWORK DEVICE HEALTH
          ==============================
          Hostname      : {{ ansible_net_hostname }}
          OS Version    : {{ ansible_net_version }}
          Model         : {{ ansible_net_model }}
          Serial Number : {{ ansible_net_serialnum | default('N/A') }}

  rescue:

    - name: Send Network Failure Alert
      ansible.builtin.include_tasks: send_monitoring_alert.yml
      vars:
        alert_title: "NETWORK DEVICE UNREACHABLE"
        alert_severity: "Critical"
        alert_message: |
          Unable to connect to device.

          Possible causes:
          • SSH unreachable
          • Authentication failure
          • Device offline
          • Connection timeout

# =============================
# CLOUD MONITORING
# =============================

- name: Monitor cloud infrastructure
  when:
    - enable_cloud_checks
    - >
      'aws_cloud' in group_names or
      'azure_cloud' in group_names or
      'gcp_cloud' in group_names or
      'oci_cloud' in group_names or
      'private_cloud' in group_names

  block:

    - name: Generate cloud metrics
      ansible.builtin.set_fact:
        cloud_metrics:
          provider: >-
            {{
              'AWS' if 'aws_cloud' in group_names else
              'Azure' if 'azure_cloud' in group_names else
              'GCP' if 'gcp_cloud' in group_names else
              'OCI' if 'oci_cloud' in group_names else
              'Private Cloud' if 'private_cloud' in group_names else
              'Unknown'
            }}
          cpu_utilization: 65
          memory_utilization: 55
          network_latency_ms: 15

    - name: Display cloud metrics
      ansible.builtin.debug:
        msg: |
          ==============================
          CLOUD HEALTH REPORT
          ==============================
          Provider : {{ cloud_metrics.provider }}
          CPU      : {{ cloud_metrics.cpu_utilization }}%
          Memory   : {{ cloud_metrics.memory_utilization }}%
          Latency  : {{ cloud_metrics.network_latency_ms }} ms

    - name: Simulate cloud connectivity
      ansible.builtin.set_fact:
        cloud_connectivity:
          api_reachable: true
          dns_reachable: true
          internet_gateway: up

    - name: Display cloud connectivity
      ansible.builtin.debug:
        msg: |
          ==============================
          CLOUD CONNECTIVITY
          ==============================
          API       : {{ cloud_connectivity.api_reachable }}
          DNS       : {{ cloud_connectivity.dns_reachable }}
          Gateway   : {{ cloud_connectivity.internet_gateway }}

  rescue:

    - name: Send Cloud Failure Alert
      ansible.builtin.include_tasks: send_monitoring_alert.yml
      vars:
        alert_title: "CLOUD PLATFORM UNREACHABLE"
        alert_severity: "Critical"
        alert_message: |
          Cloud monitoring failed.

          Possible causes:
          • API unavailable
          • Authentication failure
          • Cloud service outage
          • Network connectivity issue

# =============================
# REAL-TIME ALERTING
# =============================

# -----------------------------
# CPU ALERT
# -----------------------------

- name: Determine CPU alert severity
  ansible.builtin.set_fact:
    cpu_alert_severity: >-
      {% if cloud_metrics.cpu_utilization >= cpu_critical_threshold %}
      Critical
      {% elif cloud_metrics.cpu_utilization >= cpu_major_threshold %}
      Major
      {% else %}
      Warning
      {% endif %}
  when:
    - cloud_metrics is defined
    - cloud_metrics.cpu_utilization > cpu_threshold

- name: Send High CPU Alert
  ansible.builtin.include_tasks: send_monitoring_alert.yml
  vars:
    alert_title: "HIGH CPU UTILIZATION"
    alert_severity: "{{ cpu_alert_severity | trim }}"
    alert_message: |
      Provider : {{ cloud_metrics.provider }}
      CPU Usage: {{ cloud_metrics.cpu_utilization }}%
      Threshold: {{ cpu_threshold }}%
  when:
    - enable_cpu_alerts
    - cloud_metrics is defined
    - cloud_metrics.cpu_utilization > cpu_threshold

# -----------------------------
# MEMORY ALERT
# -----------------------------

- name: Determine Memory alert severity
  ansible.builtin.set_fact:
    memory_alert_severity: >-
      {% if cloud_metrics.memory_utilization >= memory_critical_threshold %}
      Critical
      {% elif cloud_metrics.memory_utilization >= memory_major_threshold %}
      Major
      {% else %}
      Warning
      {% endif %}
  when:
    - cloud_metrics is defined
    - cloud_metrics.memory_utilization > memory_threshold

- name: Send High Memory Alert
  ansible.builtin.include_tasks: send_monitoring_alert.yml
  vars:
    alert_title: "HIGH MEMORY UTILIZATION"
    alert_severity: "{{ memory_alert_severity | trim }}"
    alert_message: |
      Provider : {{ cloud_metrics.provider }}
      Memory Usage: {{ cloud_metrics.memory_utilization }}%
      Threshold: {{ memory_threshold }}%
  when:
    - enable_memory_alerts
    - cloud_metrics is defined
    - cloud_metrics.memory_utilization > memory_threshold

# -----------------------------
# LATENCY ALERT
# -----------------------------

- name: Determine Latency alert severity
  ansible.builtin.set_fact:
    latency_alert_severity: >-
      {% if cloud_metrics.network_latency_ms >= latency_critical_threshold %}
      Critical
      {% elif cloud_metrics.network_latency_ms >= latency_major_threshold %}
      Major
      {% else %}
      Warning
      {% endif %}
  when:
    - cloud_metrics is defined
    - cloud_metrics.network_latency_ms > latency_threshold

- name: Send High Latency Alert
  ansible.builtin.include_tasks: send_monitoring_alert.yml
  vars:
    alert_title: "HIGH NETWORK LATENCY"
    alert_severity: "{{ latency_alert_severity | trim }}"
    alert_message: |
      Provider : {{ cloud_metrics.provider }}
      Latency  : {{ cloud_metrics.network_latency_ms }} ms
      Threshold: {{ latency_threshold }} ms
  when:
    - enable_latency_alerts
    - cloud_metrics is defined
    - cloud_metrics.network_latency_ms > latency_threshold

# -----------------------------
# NETWORK DEVICE ALERT
# -----------------------------

- name: Send Network Device Alert
  ansible.builtin.include_tasks: send_monitoring_alert.yml
  vars:
    alert_title: "NETWORK DEVICE ALERT"
    alert_severity: "Critical"
    alert_message: |
      Device : {{ inventory_hostname }}

      Interface anomaly detected.
  when:
    - enable_network_alerts
    - "'routers' in group_names or 'switches' in group_names"

# =============================
# SUMMARY
# =============================

- name: Infrastructure monitoring summary
  ansible.builtin.debug:
    msg: |
      ==============================
      HYBRID OBSERVABILITY SUMMARY
      ==============================
      Host   : {{ inventory_hostname }}
      Mode   : {{ monitoring_mode }}
      Status : Monitoring Active

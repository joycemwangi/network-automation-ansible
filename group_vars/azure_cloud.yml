---
cloud_provider: Azure
ansible_connection: local

cloud_impact: |
  • Service availability degradation
  • Increased application latency
  • Network connectivity interruptions
  • Possible workload failures

cloud_possible_causes: |
  • Virtual Machine unavailable
  • Network Security Group issue
  • Virtual Network routing problem
  • Azure platform service degradation

cloud_recommended_action: |
  • Check Virtual Machine health
  • Review Network Security Group rules
  • Verify Virtual Network route tables
  • Review Azure Monitor metrics
  • Review Virtual Machine Scale Set health if applicable

cpu_impact: |
  • Increased Virtual Machine CPU utilization
  • Slower application response times
  • Reduced workload performance
  • Possible service degradation

cpu_possible_causes: |
  • High application workload
  • CPU-intensive processes
  • Recent deployment
  • Traffic spike
  • Insufficient VM size

cpu_recommended_action: |
  • Review Azure Monitor CPU metrics
  • Identify high CPU processes
  • Review recent deployments
  • Verify Virtual Machine Scale Set activity
  • Resize the Virtual Machine if necessary
  • Investigate workload distribution

memory_impact: |
  • Virtual machine performance degradation
  • Increased application response time
  • Reduced workload capacity
  • Possible service interruption

memory_possible_causes: |
  • High VM memory utilization
  • Memory leak
  • Large application cache
  • Recent deployment
  • Insufficient VM memory

memory_recommended_action: |
  • Review Azure Monitor memory metrics
  • Check running processes
  • Investigate memory leaks
  • Restart affected services if required
  • Consider vertical scaling (resize the Virtual Machine)
  • Verify Virtual Machine Scale Set configuration for horizontal scaling

latency_impact: |
  • Increased application response times
  • Virtual Machine communication delays
  • Slower workload execution
  • Reduced service availability

latency_possible_causes: |
  • Virtual Network congestion
  • Network Security Group processing delays
  • Azure Load Balancer latency
  • ExpressRoute or VPN Gateway issue
  • Azure regional service degradation

latency_recommended_action: |
  • Review Azure Monitor network metrics
  • Check Azure Network Watcher
  • Verify Virtual Network connectivity
  • Review Azure Service Health
  • Validate ExpressRoute or VPN Gateway status

monitoring_enabled: true

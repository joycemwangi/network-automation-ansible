---
cloud_provider: GCP
ansible_connection: local

cloud_impact: |
  • Service availability degradation
  • Increased application latency
  • Network connectivity interruptions
  • Possible workload failures

cloud_possible_causes: |
  • Compute Engine instance unhealthy
  • VPC firewall rule issue
  • Cloud Router connectivity problem
  • Google Cloud service disruption

cloud_recommended_action: |
  • Check Compute Engine health
  • Review Firewall Rules
  • Verify Cloud Router status
  • Review Cloud Monitoring

memory_impact: |
  • Compute Engine performance degradation
  • Increased application latency
  • Reduced workload capacity
  • Possible service interruption

memory_possible_causes: |
  • High memory utilization
  • Memory leak
  • Large application cache
  • Recent deployment
  • Insufficient instance memory

memory_recommended_action: |
  • Review Cloud Monitoring memory metrics
  • Check running processes
  • Investigate memory leaks
  • Restart affected services if required
  • Consider resizing the instance

monitoring_enabled: true

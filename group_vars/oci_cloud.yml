---
cloud_provider: OCI
ansible_connection: local

cloud_impact: |
  • Service availability degradation
  • Increased application latency
  • Network connectivity interruptions
  • Possible workload failures

cloud_possible_causes: |
  • Compute instance unhealthy
  • VCN routing issue
  • Security List misconfiguration
  • OCI regional service degradation

cloud_recommended_action: |
  • Check Compute instance status
  • Verify VCN route tables
  • Review Security Lists
  • Review OCI Monitoring

memory_impact: |
  • Compute instance performance degradation
  • Increased application response time
  • Reduced workload capacity
  • Possible service interruption

memory_possible_causes: |
  • High memory utilization
  • Memory leak
  • Large application cache
  • Recent deployment
  • Insufficient instance memory

memory_recommended_action: |
  • Review OCI Monitoring metrics
  • Check running processes
  • Investigate memory leaks
  • Restart affected services if required
  • Consider increasing compute resources

latency_impact: |
  • Increased application response times
  • Slower communication between OCI resources
  • Delayed database and application transactions
  • Reduced workload performance

latency_possible_causes: |
  • VCN routing issue
  • Dynamic Routing Gateway (DRG) congestion
  • FastConnect or IPSec VPN degradation
  • Network Security Group or Security List configuration issue
  • Regional service latency
  • Cross-region traffic congestion

latency_recommended_action: |
  • Review OCI Monitoring network metrics
  • Verify VCN route tables
  • Check FastConnect or VPN health
  • Review DRG route distribution
  • Verify Network Security Groups and Security Lists
  • Investigate regional service health

monitoring_enabled: true

---
# ==========================================
# GLOBAL MONITORING POLICY
# ==========================================

use_live_cisco_metrics: false
# enable_live_metrics: true

# Base alert thresholds
cpu_threshold: 65
memory_threshold: 80
latency_threshold: 50

# Severity thresholds
cpu_major_threshold: 70
cpu_critical_threshold: 90

memory_major_threshold: 90
memory_critical_threshold: 95

latency_major_threshold: 100
latency_critical_threshold: 200

# Monitoring configuration
enable_monitoring_checks: true
enable_network_checks: true
enable_alerting: true

monitoring_mode: hybrid

# ==========================================
# ALERT CONTROLS
# ==========================================

enable_cpu_alerts: true
enable_memory_alerts: true
enable_latency_alerts: true
enable_network_alerts: true

# ==========================================
# MONITORING NOTIFICATIONS
# ==========================================

enable_discord_alerts: true

discord_webhook_url: "{{ lookup('env', 'DISCORD_WEBHOOK_URL') }}"

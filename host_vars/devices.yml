---
# =============================
# NETWORK DEVICES
# =============================

R1-EDGE-01:
  role: "edge-router"
  location: "datacenter"
  importance: "critical"

R2-CORE-01:
  role: "core-router"
  location: "datacenter"
  importance: "critical"

SW1-ACCESS-01:
  role: "access-switch"
  location: "branch"
  importance: "medium"

SW2-ACCESS-02:
  role: "access-switch"
  location: "branch"
  importance: "medium"

# =============================
# AWS CLOUD
# =============================

AWS-USE1-01:
  cloud_provider: "aws"
  region: "us-east-1"
  role: "cloud-instance"
  importance: "high"

AWS-EUW1-01:
  cloud_provider: "aws"
  region: "eu-west-1"
  role: "cloud-instance"
  importance: "high"

# =============================
# AZURE CLOUD
# =============================

AZURE-EASTUS-01:
  cloud_provider: "azure"
  region: "eastus"
  role: "cloud-instance"
  importance: "high"

AZURE-WEU-01:
  cloud_provider: "azure"
  region: "westeurope"
  role: "cloud-instance"
  importance: "high"

# =============================
# GCP CLOUD
# =============================

GCP-USCENTRAL-01:
  cloud_provider: "gcp"
  region: "us-central1"
  role: "cloud-instance"
  importance: "medium"

GCP-EUROPE-01:
  cloud_provider: "gcp"
  region: "europe-west1"
  role: "cloud-instance"
  importance: "medium"

# =============================
# ORACLE CLOUD INFRASTRUCTURE
# =============================

OCI-PHX-01:
  cloud_provider: "oracle"
  region: "us-phoenix-1"
  role: "cloud-instance"
  importance: "high"

OCI-FRA-01:
  cloud_provider: "oracle"
  region: "eu-frankfurt-1"
  role: "cloud-instance"
  importance: "high"
  
# =============================
# PRIVATE CLOUD
# =============================

OPENSTACK-DC1:
  cloud_provider: "private"
  region: "datacenter-1"
  role: "private-cloud-node"
  importance: "critical"

PRIVATE-CLOUD-EDGE:
  cloud_provider: "private"
  region: "datacenter-edge"
